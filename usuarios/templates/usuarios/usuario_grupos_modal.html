<div class="app-card p-4">
	<div class="mb-4">
		<h1 class="h4 mb-1">Grupos de usuario</h1>
		<p class="text-muted mb-0">{{ usuario.get_full_name|default:usuario.username }}</p>
	</div>

	<form method="post" action="{{ action|default:request.path }}" data-ajax-form="true">
		{% csrf_token %}
		{{ form.non_field_errors }}

		<div class="mb-3">
			<label class="form-label">Grupos</label>
			<div class="d-flex flex-wrap gap-3">
				{% for checkbox in form.groups %}
				<div class="form-check">
					{{ checkbox.tag }}
					<label class="form-check-label" for="{{ checkbox.id_for_label }}">{{ checkbox.choice_label }}</label>
				</div>
				{% endfor %}
			</div>
			{{ form.groups.errors }}
		</div>

		<div class="d-flex flex-wrap justify-content-end gap-2 mt-4">
			<button class="btn btn-outline-secondary" type="button" data-bs-dismiss="modal">Cancelar</button>
			<button class="btn btn-brand" type="submit">Guardar grupos</button>
		</div>
	</form>
</div>
